<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concept Explainer – EduGenie</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
<nav class="navbar">
  <a href="/" class="navbar-brand"><div class="brand-icon">🧞</div><span class="brand-name">Edu<span>Genie</span></span></a>
  <ul class="nav-links">
    <li><a href="/">🏠 Home</a></li><li><a href="/ask">💬 Ask</a></li><li><a href="/explain" class="active">🔍 Explain</a></li>
    <li><a href="/quiz">📝 Quiz</a></li><li><a href="/test">✍️ Test</a></li>
    <li><a href="/flashcards">🃏 Cards</a></li><li><a href="/summary">📚 Summary</a></li><li><a href="/translate">🌐 Translate</a></li>
  </ul>
</nav>
<div class="page">
  <div class="page-header">
    <div class="page-badge">🔍 Feature 2</div>
    <h1 class="page-title">Concept <span>Explainer</span></h1>
    <p class="page-subtitle">Get a beginner-friendly breakdown of any concept with analogies and key takeaways.</p>
  </div>
  <div class="card">
    <div class="alert alert-error" id="errorAlert"><span>⚠️</span><span id="errorMsg"></span></div>
    <div class="form-row">
      <div class="form-group">
        <label for="concept">Concept *</label>
        <input type="text" id="concept" placeholder="e.g. Photosynthesis, Recursion, Black Holes…" />
      </div>
      <div class="form-group">
        <label for="level">Difficulty Level</label>
        <select id="level">
          <option value="beginner">🟢 Beginner</option>
          <option value="intermediate" selected>🟡 Intermediate</option>
          <option value="advanced">🔴 Advanced</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap">
      <button class="btn btn-primary" id="explainBtn" onclick="explainConcept()">🔍 Explain It</button>
      <button class="speak-btn" onclick="speakResult()">🔊 Read Aloud</button>
    </div>
  </div>
  <div class="spinner-wrap" id="spinner"><div class="spinner"></div><p class="spinner-text">Generating explanation…</p></div>
  <div class="result-card" id="resultCard">
    <div class="result-label" id="resultLabel">📖 Explanation</div>
    <div class="result-text" id="resultText"></div>
  </div>
</div>
<script>
async function explainConcept() {
  const concept = document.getElementById('concept').value.trim();
  const level   = document.getElementById('level').value;
  document.getElementById('errorAlert').classList.remove('show');
  if (!concept) { document.getElementById('errorMsg').textContent='Please enter a concept.'; document.getElementById('errorAlert').classList.add('show'); return; }
  setLoading(true);
  try {
    const res  = await fetch('/explain', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({concept, level}) });
    const data = await res.json();
    if (!res.ok) { document.getElementById('errorMsg').textContent=data.error||'Error'; document.getElementById('errorAlert').classList.add('show'); return; }
    const e={'beginner':'🟢','intermediate':'🟡','advanced':'🔴'};
    document.getElementById('resultLabel').textContent = `${e[level]} ${data.concept} — ${data.level.charAt(0).toUpperCase()+data.level.slice(1)}`;
    document.getElementById('resultText').textContent = data.explanation;
    document.getElementById('resultCard').classList.add('show');
  } catch(e) { document.getElementById('errorMsg').textContent='Network error.'; document.getElementById('errorAlert').classList.add('show'); }
  finally { setLoading(false); }
}
function setLoading(on) {
  const btn = document.getElementById('explainBtn');
  btn.disabled=on; btn.textContent=on?'⏳ Explaining…':'🔍 Explain It';
  document.getElementById('spinner').classList.toggle('show',on);
  if(on) document.getElementById('resultCard').classList.remove('show');
}
function speakResult() {
  const t=document.getElementById('resultText').textContent;
  if(t){window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.rate=0.9;window.speechSynthesis.speak(u);}
}
document.getElementById('concept').addEventListener('keydown',e=>{if(e.key==='Enter')explainConcept();});
</script>
</body>
</html>
